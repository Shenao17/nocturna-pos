version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: nocturna_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: nocturna_pos
      MYSQL_USER: nocturna
      MYSQL_PASSWORD: nocturna_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    container_name: nocturna_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: nocturna
      DB_PASSWORD: nocturna_password
      DB_NAME: nocturna_pos
      DEBUG: "false"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  mysql_data:
